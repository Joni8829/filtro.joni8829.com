<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <!-- WEB APP RELATED -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="FILTRO" />
        <link rel="apple-touch-icon" href="Logo-512.png" />
        <!-- WEBSITE METADATA -->
        <meta name="theme-color" content="#111010" />
        <title>FILTRO</title>
        <link rel="shortcut icon" href="camera.ico" type="image/x-icon" />
        <!-- LINK FONT, JAVASCRIPT AND CSS -->
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="manifest" href="manifest.json" />
        <link rel="stylesheet" href="./.assets/style.css" />
    </head>
    <body>
        <div class="app">
            <div class="header">
                <div class="logo">FIL<span class="logo-dot">T</span>RO</div>
                <div class="header-right">
                    <!-- Preset Management Group -->
                    <div class="preset-management">
                        <button class="btn-header" onclick="exportPresets()">📤 EXPORT</button>
                        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importPresets(event)">
                        <button class="btn-header" onclick="document.getElementById('importFile').click()">📥 IMPORT</button>
                    </div>
                    
                    <!-- Social & Upload Icons -->
                    <a href="https://github.com/Joni8829/FILTRO/" target="_blank" class="btn-icon github-link">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                        </svg>
                    </a>
                    <div class="btn-icon" id="uploadBtn">📷</div>
                </div>
            </div>
            <div class="image-wrap" id="imageWrap">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-circle">＋</div>
                    <div class="drop-hint">Tap to open a photo</div>
                    <div
                        class="drop-hint"
                        style="font-size: 9px; margin-top: -4px; color: #333"
                    >
                        Your photos never leave your device
                    </div>
                </div>
                <canvas id="previewCanvas"></canvas>
                <div class="filter-badge" id="filterBadge">Original</div>
                <div class="compare-overlay" id="compareOverlay">
                    <div class="compare-pill">
                        <div class="compare-dot"></div>
                        Original
                    </div>
                </div>
            </div>

            <div class="bottom">
                <div class="tabs">
                    <div class="tab active" data-tab="filters">Filters</div>
                    <div class="tab" data-tab="adjust">Adjust</div>
                </div>

                <!-- FILTERS PANEL -->
                <div class="panel active" id="panel-filters">
                    <div class="filter-strip-wrap">
                        <div class="filter-strip" id="filterStrip"></div>
                    </div>
                </div>

                <!-- ADJUST PANEL -->
                <div class="panel" id="panel-adjust">
                    <div class="adj-panel" id="adjPanel"></div>

                    <div style="padding: 0 14px 20px">
                        <button
                            class="btn-reset"
                            onclick="saveCurrentPreset()"
                            style="
                                width: 100%;
                                color: var(--gold);
                                border-color: var(--gold);
                            "
                        >
                            SAVE CURRENT AS PRESET
                        </button>
                    </div>
                </div>

                <div class="dl-bar">
                    <button class="btn-dl" id="downloadBtn" disabled>
                        SAVE PHOTO
                    </button>
                    <button class="btn-reset" id="resetBtn">RESET</button>
                </div>
            </div>
        </div>
        <input
            type="file"
            id="fileInput"
            accept="image/*"
            capture="environment"
        />
        <script src="./.assets/script.js"></script>
    </body>
</html>
